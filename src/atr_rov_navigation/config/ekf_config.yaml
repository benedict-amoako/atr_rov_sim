ekf_filter_node:
  ros__parameters:
    world_frame: ned_odom
    base_link_frame: base_link
    odom_frame: ned_odom
    map_frame: map
    publish_tf: true
    publish_acceleration: false
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.1

    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size: 10

    twist0: /dvl/velocity
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  true,  true,
                    false, false, false,
                    false, false, false]
    twist0_queue_size: 10
    twist0_differential: false

    pose0: /depth/pose
    pose0_config: [false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_queue_size: 10
    pose0_differential: false